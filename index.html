<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Gastei!</title>
  <meta name="description" content="Controle financeiro do Fred e da Mya" />
  <meta name="theme-color" content="#1B4F72" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --bg: #f5f6fa; --surface: #ffffff; --border: #e2e5ec;
      --text: #1a1d23; --text2: #6b7280;
      --fred: #378ADD; --fred-l: #E6F1FB; --fred-d: #185FA5;
      --mya: #D4537E; --mya-l: #FBEAF0; --mya-d: #993556;
      --ok: #1D9E75; --ok-l: #E1F5EE;
      --warn: #EF9F27; --warn-l: #FAEEDA;
      --err: #E24B4A; --err-l: #FCEBEB;
      --r: 14px; --rs: 8px; --sh: 0 1px 4px rgba(0,0,0,.07);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0f1117; --surface:#1c1f27; --border:#2a2f3d;
        --text:#f0f1f5; --text2:#8b92a8;
        --fred-l:#1a2d45; --mya-l:#3a1c28;
        --ok-l:#0d2e22; --warn-l:#2e2010; --err-l:#2e1212;
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

    /* ── TELA DE IDENTIFICAÇÃO ── */
    #tela-login{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#1B4F72 0%,#2471A3 55%,#1a3a52 100%)}
    #tela-login.hide{display:none}
    .login-logo{font-size:48px;margin-bottom:6px}
    .login-title{font-size:28px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.3px}
    .login-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:48px;text-align:center}
    .login-pergunta{font-size:13px;font-weight:500;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
    .login-opcoes{display:flex;gap:12px;width:100%;max-width:320px}
    .login-btn{flex:1;padding:20px 12px;border:1.5px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(255,255,255,.08);cursor:pointer;text-align:center;transition:all .2s;backdrop-filter:blur(4px)}
    .login-btn:active{transform:scale(.97)}
    .login-btn.fred:hover,.login-btn.fred:focus{background:rgba(55,138,221,.3);border-color:rgba(55,138,221,.6)}
    .login-btn.mya:hover,.login-btn.mya:focus{background:rgba(212,83,126,.3);border-color:rgba(212,83,126,.6)}
    .login-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 10px}
    .av-fred-bg{background:rgba(55,138,221,.25);color:#7EC1FF}
    .av-mya-bg{background:rgba(212,83,126,.25);color:#F09DBB}
    .login-nome{font-size:16px;font-weight:600;color:#fff}
    .login-total{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}

    /* ── APP ── */
    #app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto}

    /* HEADER */
    .hdr{background:var(--surface);border-bottom:0.5px solid var(--border)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .hdr-logo{font-size:20px;font-weight:700;letter-spacing:-.3px}
    .hdr-sub{font-size:11px;color:var(--text2);margin-top:1px}
    .usuario-chip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:20px;cursor:pointer;transition:background .15s;border:0.5px solid var(--border)}
    .usuario-chip:active{background:var(--bg)}
    .u-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .u-av.fred{background:var(--fred-l);color:var(--fred-d)}
    .u-av.mya{background:var(--mya-l);color:var(--mya-d)}
    .u-nome{font-size:12px;font-weight:600}
    .mes-nav{display:flex;align-items:center;gap:4px;padding:0 16px 10px}
    .mes-arrow{width:26px;height:26px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px}
    .mes-arrow:active{background:var(--border)}
    .mes-label{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--fred-d);background:var(--fred-l);padding:5px 12px;border-radius:20px}
    .top-nav{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 4px}
    .tnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0 9px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:10px;font-weight:500;border-bottom:2px solid transparent;transition:all .15s}
    .tnb i{font-size:19px}
    .tnb.on{color:var(--fred);border-bottom-color:var(--fred)}
    .tnb-central{position:relative;padding:4px 0 9px}
    .tnb-logo{font-size:22px;display:block;margin-bottom:1px}
    .tnb-central.on{color:var(--fred);border-bottom-color:var(--fred)}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;padding:14px}
    .page{display:none}.page.on{display:block}

    /* HERO CARD */
    .hero{background:linear-gradient(135deg,#1B4F72 0%,#2471A3 100%);border-radius:18px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05)}
    .hero::after{content:'';position:absolute;left:-20px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
    .hero-saudacao{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:2px}
    .hero-label{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
    .hero-val{font-size:32px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:2px}
    .hero-status{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:14px}
    .hero-status.ok{color:#5DCAA5}
    .hero-pills{display:flex;gap:6px;position:relative;z-index:1}
    .hp{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 10px;flex:1}
    .hp-l{font-size:9px;color:rgba(255,255,255,.5);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .hp-v{font-size:12px;font-weight:600;color:#fff}

    /* CARDS */
    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;box-shadow:var(--sh)}
    .card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
    .card-link{font-size:11px;color:var(--fred);cursor:pointer}

    /* STACKED BAR */
    .pessoa-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:7px}
    .p-name{display:flex;align-items:center;gap:5px;font-weight:500}
    .dot{width:8px;height:8px;border-radius:50%}
    .dot-f{background:var(--fred)}.dot-m{background:var(--mya)}
    .stacked{height:8px;border-radius:4px;overflow:hidden;display:flex}
    .sf{background:var(--fred)}.sm{background:var(--mya)}

    /* PROGRESS */
    .prog{margin-bottom:9px}
    .prog:last-child{margin-bottom:0}
    .prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .prog-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px}
    .prog-right{display:flex;align-items:center;gap:5px}
    .prog-vals{font-size:10px;color:var(--text2)}
    .bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
    .bf{height:100%;border-radius:3px}
    .bf-ok{background:var(--ok)}.bf-warn{background:var(--warn)}.bf-ov{background:var(--err)}
    .tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
    .tag-ok{background:var(--ok-l);color:#0F6E56}.tag-warn{background:var(--warn-l);color:#854F0B}.tag-ov{background:var(--err-l);color:#A32D2D}

    /* BOLETOS */
    .grupo-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
    .grupo-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none}
    .grupo-titulo{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
    .grupo-resumo{font-size:11px;color:var(--text2)}
    .boleto-row{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 18px;border-top:0.5px solid var(--border)}
    .b-check{cursor:pointer;display:flex;align-items:center;gap:9px;flex:1}
    .chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .chk.on{background:var(--ok);border-color:var(--ok)}
    .b-info{flex:1}
    .b-nome{font-size:12px;font-weight:500}
    .b-nome.riscado{text-decoration:line-through;color:var(--text2)}
    .chip{font-size:9px;font-weight:500;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:2px}
    .chip-ok{background:var(--ok-l);color:#0F6E56}.chip-warn{background:var(--warn-l);color:#854F0B}.chip-err{background:var(--err-l);color:#A32D2D}
    .b-right{display:flex;align-items:center;gap:5px}
    .b-val{font-size:12px;font-weight:600}
    .edit-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:3px;border-radius:4px}
    .edit-btn:active{color:var(--fred)}

    /* MÉTRICAS */
    .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .metric{background:var(--bg);border-radius:var(--rs);padding:10px 12px}
    .metric-l{font-size:10px;color:var(--text2);margin-bottom:3px}
    .metric-v{font-size:15px;font-weight:600}
    .metric-v.ok{color:var(--ok)}.metric-v.warn{color:#BA7517}.metric-v.ov{color:var(--err)}

    /* ALERTA */
    .alerta{background:var(--warn-l);border:0.5px solid var(--warn);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
    .al-title{font-size:10px;font-weight:600;color:#854F0B;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
    .al-row{display:flex;justify-content:space-between;font-size:12px;color:#633806;padding:3px 0}
    .al-row:not(:last-child){border-bottom:0.5px solid rgba(239,159,39,.25)}

    /* LANÇAR */
    .lancar-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
    .sec-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
    .tipo-toggle{display:flex;gap:8px;margin-bottom:14px}
    .tipo-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;text-align:center}
    .tipo-btn.on.fred{border-color:var(--fred);background:var(--fred-l);color:var(--fred-d)}
    .tipo-btn.on.mya{border-color:var(--mya);background:var(--mya-l);color:var(--mya-d)}
    .parcelas-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .parcelas-label{font-size:13px;color:var(--text2);white-space:nowrap}
    .parc-ctrl{display:flex;align-items:center;gap:10px}
    .parc-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text)}
    .parc-num{font-size:18px;font-weight:600;min-width:22px;text-align:center}
    .parc-info{font-size:12px;color:var(--text2);margin-top:3px;margin-bottom:12px}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
    .cat-btn{border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rs);padding:9px 5px;cursor:pointer;text-align:center;transition:all .15s}
    .cat-btn:active{transform:scale(.97)}
    .cat-btn.on.fred{border-color:var(--fred);background:var(--fred-l)}
    .cat-btn.on.mya{border-color:var(--mya);background:var(--mya-l)}
    .cat-icon{font-size:20px;margin-bottom:2px}
    .cat-name{font-size:10px;font-weight:500;color:var(--text)}
    .cat-pct{font-size:9px;color:var(--text2);margin-top:1px}
    .alerta-cat{border-radius:var(--rs);padding:9px 12px;margin-bottom:12px;font-size:12px;font-weight:500}
    .alerta-ok{background:var(--ok-l);color:#0F6E56}.alerta-warn{background:var(--warn-l);color:#854F0B}.alerta-ov{background:var(--err-l);color:#A32D2D}
    .inp-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
    .valor-input{width:100%;font-size:30px;font-weight:700;border:none;border-bottom:2px solid var(--border);background:transparent;color:var(--text);padding:4px 0;outline:none;text-align:center;transition:border-color .2s;margin-bottom:14px}
    .valor-input.fred:focus{border-bottom-color:var(--fred)}
    .valor-input.mya:focus{border-bottom-color:var(--mya)}
    .obs-input{width:100%;font-size:13px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);padding:9px 12px;outline:none;margin-bottom:14px}
    .obs-input:focus{border-color:var(--fred)}
    .btn-main{width:100%;padding:14px;border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .btn-main:active{opacity:.85}
    .btn-fred{background:var(--fred)}.btn-mya{background:var(--mya)}.btn-off{background:var(--border)!important;color:var(--text2);cursor:not-allowed}

    /* HISTÓRICO */
    .filter-row{display:flex;gap:6px;margin-bottom:12px}
    .fchip{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:11px;font-weight:500;cursor:pointer;color:var(--text2)}
    .fchip.on{background:var(--bg);color:var(--text);border-color:var(--text2)}
    .lanc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border)}
    .lanc-row:last-child{border:none}
    .badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
    .badge-f{background:var(--fred-l);color:var(--fred-d)}.badge-m{background:var(--mya-l);color:var(--mya-d)}.badge-p{background:#F0ECF9;color:#5B3FA6}
    .del-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:4px;border-radius:4px}
    .del-btn:active{color:var(--err)}
    .empty{text-align:center;color:var(--text2);font-size:13px;padding:2rem 0}

    /* MODAL */
    #modal-boleto{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
    #modal-boleto.hide{display:none}
    .modal-box{background:var(--surface);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:480px}
    .modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
    .modal-input{width:100%;font-size:24px;font-weight:700;border:none;border-bottom:2px solid var(--fred);background:transparent;color:var(--text);padding:4px 0;outline:none;text-align:center;margin-bottom:16px}
    .modal-field{margin-bottom:16px}
    .modal-field-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
    .modal-venc-ctrl{display:flex;align-items:center;justify-content:center;gap:16px}
    .modal-venc-num{font-size:28px;font-weight:700;min-width:40px;text-align:center;color:var(--text)}
    .modal-btns{display:flex;gap:8px}
    .modal-btn{flex:1;padding:12px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer}
    .modal-btn.cancel{background:var(--bg);color:var(--text2)}.modal-btn.confirm{background:var(--fred);color:#fff}

    /* LOADING */
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
    #loading.hide{opacity:0;pointer-events:none}
    .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--fred);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1d23;color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:400}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>
<div id="toast"></div>

<!-- TELA DE IDENTIFICAÇÃO -->
<div id="tela-login">
  <div class="login-logo">💸</div>
  <div class="login-title">Gastei!</div>
  <div class="login-sub">Controle financeiro do Fred e da Mya</div>
  <div class="login-pergunta">Quem é você?</div>
  <div class="login-opcoes">
    <div class="login-btn fred" onclick="entrar('fred')">
      <div class="login-avatar av-fred-bg">F</div>
      <div class="login-nome">Fred</div>
      <div class="login-total" id="login-total-fred">—</div>
    </div>
    <div class="login-btn mya" onclick="entrar('mya')">
      <div class="login-avatar av-mya-bg">M</div>
      <div class="login-nome">Mya</div>
      <div class="login-total" id="login-total-mya">—</div>
    </div>
  </div>
</div>

<!-- MODAL BOLETO -->
<div id="modal-boleto" class="hide">
  <div class="modal-box">
    <div class="modal-title" id="modal-titulo">Editar boleto</div>
    <div class="modal-field">
      <div class="modal-field-label">Nome do boleto</div>
      <input class="modal-input" type="text" id="modal-inp-nome" placeholder="ex: Energia, Internet…" style="font-size:18px" />
    </div>
    <div class="modal-field">
      <div class="modal-field-label">Valor (R$)</div>
      <input class="modal-input" type="number" id="modal-inp-valor" inputmode="decimal" step="0.01" placeholder="0,00" />
    </div>
    <div class="modal-field">
      <div class="modal-field-label">Dia do vencimento</div>
      <div class="modal-venc-ctrl">
        <button class="parc-btn" onclick="mudaVenc(-1)">−</button>
        <span class="modal-venc-num" id="modal-venc-num">10</span>
        <button class="parc-btn" onclick="mudaVenc(1)">+</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn confirm" onclick="salvarModal()">Salvar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="hdr">
    <div class="hdr-top">
      <div class="hdr-left">
        <div class="hdr-sub">Controle financeiro do Fred e da Mya</div>
      </div>
      <div class="usuario-chip" onclick="trocarUsuario()" id="usuario-chip" title="Trocar usuário">
        <div class="u-av" id="u-av">F</div>
        <span class="u-nome" id="u-nome">Fred</span>
        <i class="ti ti-chevron-down" style="font-size:12px;color:var(--text2)" aria-hidden="true"></i>
      </div>
    </div>
    <div class="mes-nav">
      <button class="mes-arrow" onclick="mudarMes(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <div class="mes-label" id="mes-label">—</div>
      <button class="mes-arrow" onclick="mudarMes(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <nav class="top-nav">
      <button class="tnb" onclick="goPage('controle')"><i class="ti ti-chart-bar" aria-hidden="true"></i>Controle</button>
      <button class="tnb tnb-central on" onclick="goPage('dash')" id="nav-gastei">
        <span class="tnb-logo">💸</span>
        <span>Gastei!</span>
      </button>

function calcMes(off=0){
  const d=new Date(), dia=d.getDate()
  const base=dia<10?new Date(d.getFullYear(),d.getMonth()-1,1):new Date(d.getFullYear(),d.getMonth(),1)
  const ref=new Date(base.getFullYear(),base.getMonth()+off,1)
  return `${ref.getFullYear()}-${String(ref.getMonth()+1).padStart(2,'0')}`
}

  const [a,m]=mesAtual().split('-')

  return n.charAt(0).toUpperCase()+n.slice(1,3)+' '+a
}

    gastos=data||[]

}

function renderCatGrid(){

function showAlerta(){
  const box=document.getElementById('alerta-cat');if(!box)return
  if(!catSel){box.style.display='none';return}
  const c=CATS.find(x=>x.id===catSel)
  const g=gastos.filter(x=>x.cat===c.id).reduce((a,b)=>a+b.valor,0)
  const rest=c.limite-g,pct=Math.round(g/c.limite*100)
  let cls,msg
  if(pct>=100){cls='alerta-ov';msg=`<i class="ti ti-alert-circle" aria-hidden="true"></i> Limite estourado em ${fmt(Math.abs(rest))}!`}
  else if(pct>=75){cls='alerta-warn';msg=`<i class="ti ti-alert-triangle" aria-hidden="true"></i> Atenção: ${fmt(rest)} restando`}
  else{cls='alerta-ok';msg=`<i class="ti ti-check" aria-hidden="true"></i> ${fmt(rest)} disponível (${100-pct}% livre)`}
  box.className='alerta-cat '+cls;box.innerHTML=msg;box.style.display='block'
}
window.lancar=async function(){
  const vTotal=parseFloat(document.getElementById('inp-valor').value)
  const obs=document.getElementById('inp-obs').value.trim()
  if(!usuario||!catSel||!vTotal||vTotal<=0)return
  const hoje=new Date().toLocaleDateString('pt-BR')
  const novos=[]
  if(tipoLanc==='cartao'&&numParcelas>1){
    const[ano,mes]=mesAtual().split('-').map(Number)
    for(let i=0;i<numParcelas;i++){
      const ref=new Date(ano,mes-1+i,1)
      const mesParc=`${ref.getFullYear()}-${String(ref.getMonth()+1).padStart(2,'0')}`
      novos.push({id:crypto.randomUUID(),pessoa:usuario,cat:catSel,valor:parseFloat((vTotal/numParcelas).toFixed(2)),obs:obs+` (${i+1}/${numParcelas})`,mes:mesParc,data:hoje,tipo:'cartao',created_at:new Date().toISOString()})
    }
  }else{
    novos.push({id:crypto.randomUUID(),pessoa:usuario,cat:catSel,valor:vTotal,obs,mes:mesAtual(),data:hoje,tipo:'normal',created_at:new Date().toISOString()})
  }
  document.getElementById('inp-valor').value=''
  document.getElementById('inp-obs').value=''
  catSel=null
  novos.forEach(n=>{if(n.mes===mesAtual())gastos.push(n)})
  const todos=JSON.parse(localStorage.getItem('gastos_v3')||'[]').filter(g=>!novos.find(n=>n.id===g.id))
  localStorage.setItem('gastos_v3',JSON.stringify([...todos,...novos]))
  renderAll()
  try{
    const{error}=await sb.from('gastos').insert(novos);if(error)throw error
    toast(tipoLanc==='cartao'&&numParcelas>1?`✅ ${numParcelas}x de ${fmt(vTotal/numParcelas)} lançadas!`:'✅ Gasto registrado!')
  }catch{toast('⚠️ Salvo localmente')}
  goPage('dash')
}

    </div>
    <p class="sec-label">Categoria</p>
    <div class="cat-grid" id="cat-grid"></div>
    <div id="alerta-cat" style="display:none"></div>

// ── CONTROLE (antigo PAINEL) ────────────────────────
function renderControle(){
  const el=document.getElementById('page-controle');if(!el)return
  const tb=todosBoletos()
  const totalGasto=gastos.reduce((a,b)=>a+b.valor,0)
  const totalFixo=tb.reduce((a,b)=>a+b.valor,0)
  const totalPago=tb.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
  const livre=RENDA-totalFixo-LIMITE_VAR
  const gastoPct=Math.min(100,Math.round(totalGasto/LIMITE_VAR*100))
  const gFred=gastos.filter(x=>x.pessoa==='fred').reduce((a,b)=>a+b.valor,0)
  const gMya=gastos.filter(x=>x.pessoa==='mya').reduce((a,b)=>a+b.valor,0)
  const fredPct=totalGasto>0?Math.round(gFred/totalGasto*100):50
  const hoje=new Date().getDate()
  const pendentes=tb.filter(b=>!boletosPagos.includes(b.id)&&b.venc-hoje>=0&&b.venc-hoje<=5)
  const statusTxt=gastoPct>=100?'Atenção — limite variável estourado':gastoPct>=75?'Cuidado — limite variável próximo':'Bom ritmo — dentro do planejado'
  const statusOk=gastoPct<75

  let html=''

  // 1. HERO
  html+=`<div class="hero">
    <div class="hero-saudacao">${getSaudacao()}, ${usuario==='fred'?'Fred':'Mya'}! 👋</div>
    <div class="hero-label">Margem livre do mês</div>
    <div class="hero-val">${fmt(livre)}</div>
    <div class="hero-status${statusOk?' ok':''}">${statusTxt}</div>
    <div class="hero-pills">
      <div class="hp"><div class="hp-l">Renda</div><div class="hp-v">${fmt(RENDA)}</div></div>
      <div class="hp"><div class="hp-l">Boletos pagos</div><div class="hp-v">${fmt(totalPago)}</div></div>
      <div class="hp"><div class="hp-l">Gasto variável</div><div class="hp-v">${fmt(totalGasto)}</div></div>
    </div>
  </div>`

  // 2. Fred vs Mya
  html+=`<div class="card">
    <div class="card-hdr"><span class="card-title">Gastos por pessoa</span></div>
    <div class="pessoa-row">
      <span class="p-name"><span class="dot dot-f"></span>Fred — ${fmt(gFred)}</span>
      <span class="p-name">Mya — ${fmt(gMya)}<span class="dot dot-m"></span></span>
    </div>
    <div class="stacked"><div class="sf" style="width:${fredPct}%"></div><div class="sm" style="width:${100-fredPct}%"></div></div>
  </div>`

  // 3. Categorias
  html+=`<div class="card"><div class="card-hdr"><span class="card-title">Categorias variáveis</span></div>`
  CATS.forEach(c=>{
    const gt=gastos.filter(x=>x.cat===c.id).reduce((a,b)=>a+b.valor,0)
    const gF=gastos.filter(x=>x.cat===c.id&&x.pessoa==='fred').reduce((a,b)=>a+b.valor,0)
    const gM=gastos.filter(x=>x.cat===c.id&&x.pessoa==='mya').reduce((a,b)=>a+b.valor,0)
    const pct=Math.min(100,Math.round(gt/c.limite*100))
    const bCls=pct>=100?'bf-ov':pct>=75?'bf-warn':'bf-ok'
    const tCls=pct>=100?'tag-ov':pct>=75?'tag-warn':'tag-ok'
    const tTxt=pct>=100?'Estourou':pct>=75?'Atenção':'Ok'
    const sub=(gF>0||gM>0)?`<span style="font-size:10px;color:var(--text2)">${gF>0?'F:'+fmt(gF):''}${gF>0&&gM>0?' · ':''}${gM>0?'M:'+fmt(gM):''}</span>`:''
    html+=`<div class="prog">
      <div class="prog-top">
        <span class="prog-name"><i class="${c.icon}" style="font-size:13px;color:${c.color}" aria-hidden="true"></i>${c.label} ${sub}</span>
        <span class="prog-right"><span class="prog-vals">${fmt(gt)} / ${fmt(c.limite)}</span><span class="tag ${tCls}">${tTxt}</span></span>
      </div>
      <div class="bar"><div class="bf ${bCls}" style="width:${pct}%"></div></div>
    </div>`
  })
  html+=`</div>`

  // 4. Boletos por grupo
  html+=`<div class="card" onclick="goPage('fixos')" style="cursor:pointer">
    <div class="card-hdr"><span class="card-title">Boletos por grupo</span><span class="card-link">Ver todos <i class="ti ti-chevron-right" aria-hidden="true"></i></span></div>`
  grupos().forEach(gr=>{
    const pagos=gr.boletos.filter(b=>boletosPagos.includes(b.id)).length
    const pago$=gr.boletos.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
    const pct=Math.round(pagos/gr.boletos.length*100)
    html+=`<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
        <span style="font-weight:500;display:flex;align-items:center;gap:5px"><i class="${gr.icon}" style="font-size:13px;color:${gr.color}" aria-hidden="true"></i>${gr.titulo}</span>
        <span style="color:var(--text2)">${pagos}/${gr.boletos.length} · ${fmt(pago$)}</span>
      </div>
      <div class="bar"><div class="bf bf-ok" style="width:${pct}%"></div></div>
    </div>`
  })
  html+=`</div>`

  // 5. Métricas resumo (penúltimo)
  html+=`<div class="metric-grid">
    <div class="metric"><div class="metric-l">Renda</div><div class="metric-v">${fmt(RENDA)}</div></div>
    <div class="metric"><div class="metric-l">Boletos pagos</div><div class="metric-v${totalPago===totalFixo?' ok':''}">${fmt(totalPago)}</div></div>
    <div class="metric"><div class="metric-l">Gasto variável</div><div class="metric-v${gastoPct>=100?' ov':gastoPct>=75?' warn':''}">${fmt(totalGasto)}</div></div>
    <div class="metric"><div class="metric-l">Margem livre</div><div class="metric-v ok">${fmt(livre)}</div></div>
  </div>`

  // 6. Vencendo em breve (último)
  if(pendentes.length){
    html+=`<div class="alerta">
      <div class="al-title"><i class="ti ti-bell" aria-hidden="true"></i> Vencendo em breve</div>`
    pendentes.forEach(b=>{
      const d=b.venc-hoje
      html+=`<div class="al-row"><span>${b.nome}</span><span>${d===0?'Vence hoje!':'Em '+d+'d'} · ${fmt(b.valor)}</span></div>`
    })
    html+=`</div>`
  }

  el.innerHTML=html
}

// ── BOLETOS ────────────────────────────────────────
function renderFixos(){
  const el=document.getElementById('page-fixos');if(!el)return
  const tb=todosBoletos()
  const totalGeral=tb.reduce((a,b)=>a+b.valor,0)
  const totalPago=tb.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
  let html=`<div class="metric-grid">
    <div class="metric"><div class="metric-l">Total de boletos</div><div class="metric-v">${fmt(totalGeral)}</div></div>
    <div class="metric"><div class="metric-l">Pago até agora</div><div class="metric-v ok">${fmt(totalPago)}</div></div>
  </div>`
  grupos().forEach(gr=>{
    const collapsed=gruposCollapsed[gr.id]
    const pagos=gr.boletos.filter(b=>boletosPagos.includes(b.id)).length
    const pago$=gr.boletos.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
    html+=`<div class="grupo-card">
      <div class="grupo-hdr" onclick="toggleGrupo('${gr.id}')">
        <span class="grupo-titulo"><i class="${gr.icon}" style="font-size:15px;color:${gr.color}" aria-hidden="true"></i>${gr.titulo}</span>
        <span style="display:flex;align-items:center;gap:7px">
          <span class="grupo-resumo">${pagos}/${gr.boletos.length} · ${fmt(pago$)}</span>
          <i class="ti ${collapsed?'ti-chevron-down':'ti-chevron-up'}" style="font-size:13px;color:var(--text2)" aria-hidden="true"></i>
        </span>
      </div>`
    if(!collapsed){
      gr.boletos.forEach(b=>{
        const pago=boletosPagos.includes(b.id)
        const h=new Date().getDate(),diff=b.venc-h
        let cc='chip-ok',ct=`Dia ${b.venc}`
        if(pago){cc='chip-ok';ct='Pago ✓'}
        else if(diff<0){cc='chip-warn';ct=`Dia ${b.venc}`}
        else if(diff===0){cc='chip-err';ct='Vence hoje!'}
        else if(diff<=5){cc='chip-warn';ct=`Em ${diff}d`}
        html+=`<div class="boleto-row">
          <div class="b-check" onclick="toggleBoleto('${b.id}')">
            <div class="chk ${pago?'on':''}"><i class="ti ti-check" style="font-size:11px;color:${pago?'#fff':'transparent'}" aria-hidden="true"></i></div>
            <div class="b-info">
              <div class="b-nome ${pago?'riscado':''}">${b.nome}</div>
              <span class="chip ${cc}">${ct}</span>
            </div>
          </div>
          <div class="b-right">
            <div class="b-val">${fmt(b.valor)}</div>
            <button class="edit-btn" onclick="abrirModal('${b.id}','${b.nome}',${b.valor},${b.venc})" aria-label="Editar valor"><i class="ti ti-pencil" aria-hidden="true"></i></button>
          </div>
        </div>`
      })
    }
    html+=`</div>`
  })
  el.innerHTML=html
}

// ── HISTÓRICO ──────────────────────────────────────
function renderHist(){
  const el=document.getElementById('page-historico');if(!el)return
  const filtrados=histFiltro==='todos'?gastos:gastos.filter(x=>x.pessoa===histFiltro)
  const sorted=[...filtrados].reverse()
  let html=`<div class="filter-row">
    <button class="fchip ${histFiltro==='todos'?'on':''}" onclick="setFiltro('todos')">Todos</button>
    <button class="fchip ${histFiltro==='fred'?'on':''}" onclick="setFiltro('fred')">Fred</button>
    <button class="fchip ${histFiltro==='mya'?'on':''}" onclick="setFiltro('mya')">Mya</button>
  </div>`
  if(!sorted.length){html+=`<div class="card"><p class="empty"><i class="ti ti-receipt-off" style="font-size:26px;display:block;margin-bottom:8px" aria-hidden="true"></i>Nenhum lançamento ainda</p></div>`;el.innerHTML=html;return}
  const totalF=filtrados.reduce((a,b)=>a+b.valor,0)
  html+=`<div class="metric-grid">
    <div class="metric"><div class="metric-l">${sorted.length} lançamento${sorted.length!==1?'s':''}</div><div class="metric-v">${fmt(totalF)}</div></div>
    <div class="metric"><div class="metric-l">Média por gasto</div><div class="metric-v">${fmt(sorted.length?totalF/sorted.length:0)}</div></div>
  </div><div class="card">`
  sorted.forEach(g=>{
    const c=CATS.find(x=>x.id===g.cat)||{icon:'ti ti-dots',label:'Outros',color:'#888'}
    const isFred=g.pessoa==='fred',isParc=g.tipo==='cartao'
    html+=`<div class="lanc-row">
      <div style="display:flex;align-items:center;gap:8px">
        <i class="${c.icon}" style="font-size:15px;color:${c.color}" aria-hidden="true"></i>
        <div>
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:500">${c.label}</span>
            <span class="badge ${isFred?'badge-f':'badge-m'}">${isFred?'Fred':'Mya'}</span>
            ${isParc?'<span class="badge badge-p"><i class="ti ti-credit-card" style="font-size:9px" aria-hidden="true"></i> Cartão</span>':''}
          </div>
          <div style="font-size:10px;color:var(--text2)">${g.data}${g.obs?' · '+g.obs:''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:13px;font-weight:600;color:var(--err)">- ${fmt(g.valor)}</span>
        <button class="del-btn" onclick="deletarGasto('${g.id}')" aria-label="Excluir"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>`
  })
  html+=`</div>`
  el.innerHTML=html
}
window.setFiltro=f=>{histFiltro=f;renderHist()}

// ── RENDER GERAL ───────────────────────────────────
function renderAll(){renderHome();renderControle();renderFixos();renderHist()}
async function recarregarDados(){
  await Promise.all([carregarGastos(),carregarBoletos()])
  atualizarTotaisLogin()
  renderAll()
}

// ── INIT ───────────────────────────────────────────
async function init(){
  document.getElementById('mes-label').textContent=mesLabel()
  gruposCollapsed=JSON.parse(localStorage.getItem('gruposCollapsed')||'{}')
  boletoValores=JSON.parse(localStorage.getItem('boletoValores')||'{}')
  boletoVencimentos=JSON.parse(localStorage.getItem('boletoVencimentos')||'{}')
  boletoNomes=JSON.parse(localStorage.getItem('boletoNomes')||'{}')
  try{await Promise.all([carregarGastos(),carregarBoletos()])}catch{}
  atualizarTotaisLogin()
  const u=localStorage.getItem('gastei_usuario')
  if(u){usuario=u;document.getElementById('tela-login').classList.add('hide');atualizarChip();renderAll()}
  hideLoading()
}
init()
</script>
