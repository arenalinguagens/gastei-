<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Gastei!</title>
  <meta name="description" content="Controle financeiro do Fred e da Mya" />
  <meta name="theme-color" content="#1B4F72" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f5f6fa; --surface: #ffffff; --border: #e2e5ec;
      --text: #1a1d23; --text2: #6b7280;
      --fred: #378ADD; --fred-l: #E6F1FB; --fred-d: #185FA5;
      --mya: #D4537E; --mya-l: #FBEAF0; --mya-d: #993556;
      --ok: #1D9E75; --ok-l: #E1F5EE;
      --warn: #EF9F27; --warn-l: #FAEEDA;
      --err: #E24B4A; --err-l: #FCEBEB;
      --r: 14px; --rs: 8px; --sh: 0 1px 4px rgba(0,0,0,.07);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0f1117; --surface:#1c1f27; --border:#2a2f3d;
        --text:#f0f1f5; --text2:#8b92a8;
        --fred-l:#1a2d45; --mya-l:#3a1c28;
        --ok-l:#0d2e22; --warn-l:#2e2010; --err-l:#2e1212;
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

    /* ── TELA DE IDENTIFICAÇÃO ── */
    #tela-login{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#1B4F72 0%,#2471A3 55%,#1a3a52 100%)}
    #tela-login.hide{display:none}
    .login-logo{font-size:48px;margin-bottom:6px}
    .login-title{font-size:28px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.3px}
    .login-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:48px;text-align:center}
    .login-pergunta{font-size:13px;font-weight:500;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
    .login-opcoes{display:flex;gap:12px;width:100%;max-width:320px}
    .login-btn{flex:1;padding:20px 12px;border:1.5px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(255,255,255,.08);cursor:pointer;text-align:center;transition:all .2s;backdrop-filter:blur(4px)}
    .login-btn:active{transform:scale(.97)}
    .login-btn.fred:hover,.login-btn.fred:focus{background:rgba(55,138,221,.3);border-color:rgba(55,138,221,.6)}
    .login-btn.mya:hover,.login-btn.mya:focus{background:rgba(212,83,126,.3);border-color:rgba(212,83,126,.6)}
    .login-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 10px}
    .av-fred-bg{background:rgba(55,138,221,.25);color:#7EC1FF}
    .av-mya-bg{background:rgba(212,83,126,.25);color:#F09DBB}
    .login-nome{font-size:16px;font-weight:600;color:#fff}
    .login-total{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}

    /* ── APP ── */
    #app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto}

    /* HEADER */
    .hdr{background:var(--surface);border-bottom:0.5px solid var(--border)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .hdr-logo{font-size:20px;font-weight:700;letter-spacing:-.3px}
    .hdr-sub{font-size:11px;color:var(--text2);margin-top:1px}
    .usuario-chip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:20px;cursor:pointer;transition:background .15s;border:0.5px solid var(--border)}
    .usuario-chip:active{background:var(--bg)}
    .u-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .u-av.fred{background:var(--fred-l);color:var(--fred-d)}
    .u-av.mya{background:var(--mya-l);color:var(--mya-d)}
    .u-nome{font-size:12px;font-weight:600}
    .mes-nav{display:flex;align-items:center;gap:4px;padding:0 16px 10px}
    .mes-arrow{width:26px;height:26px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px}
    .mes-arrow:active{background:var(--border)}
    .mes-label{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--fred-d);background:var(--fred-l);padding:5px 12px;border-radius:20px}
    .top-nav{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 4px}
    .tnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0 9px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:10px;font-weight:500;border-bottom:2px solid transparent;transition:all .15s}
    .tnb i{font-size:19px}
    .tnb.on{color:var(--fred);border-bottom-color:var(--fred)}
    .tnb-central{position:relative;padding:4px 0 9px}
    .tnb-logo{font-size:22px;display:block;margin-bottom:1px}
    .tnb-central.on{color:var(--fred);border-bottom-color:var(--fred)}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;padding:14px}
    .page{display:none}.page.on{display:block}

    /* HERO CARD */
    .hero{background:linear-gradient(135deg,#1B4F72 0%,#2471A3 100%);border-radius:18px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05)}
    .hero::after{content:'';position:absolute;left:-20px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
    .hero-saudacao{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:2px}
    .hero-label{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
    .hero-val{font-size:32px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:2px}
    .hero-status{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:14px}
    .hero-status.ok{color:#5DCAA5}
    .hero-pills{display:flex;gap:6px;position:relative;z-index:1}
    .hp{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 10px;flex:1}
    .hp-l{font-size:9px;color:rgba(255,255,255,.5);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .hp-v{font-size:12px;font-weight:600;color:#fff}

    /* CARDS */
    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;box-shadow:var(--sh)}
    .card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
    .card-link{font-size:11px;color:var(--fred);cursor:pointer}

    /* STACKED BAR */
    .pessoa-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:7px}
    .p-name{display:flex;align-items:center;gap:5px;font-weight:500}
    .dot{width:8px;height:8px;border-radius:50%}
    .dot-f{background:var(--fred)}.dot-m{background:var(--mya)}
    .stacked{height:8px;border-radius:4px;overflow:hidden;display:flex}
    .sf{background:var(--fred)}.sm{background:var(--mya)}

    /* PROGRESS */
    .prog{margin-bottom:9px}
    .prog:last-child{margin-bottom:0}
    .prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .prog-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px}
    .prog-right{display:flex;align-items:center;gap:5px}
    .prog-vals{font-size:10px;color:var(--text2)}
    .bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
    .bf{height:100%;border-radius:3px}
    .bf-ok{background:var(--ok)}.bf-warn{background:var(--warn)}.bf-ov{background:var(--err)}
    .tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
    .tag-ok{background:var(--ok-l);color:#0F6E56}.tag-warn{background:var(--warn-l);color:#854F0B}.tag-ov{background:var(--err-l);color:#A32D2D}

    /* BOLETOS */
    .grupo-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
    .grupo-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none}
    .grupo-titulo{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
    .grupo-resumo{font-size:11px;color:var(--text2)}
    .boleto-row{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 18px;border-top:0.5px solid var(--border)}
    .b-check{cursor:pointer;display:flex;align-items:center;gap:9px;flex:1}
    .chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .chk.on{background:var(--ok);border-color:var(--ok)}
    .b-info{flex:1}
    .b-nome{font-size:12px;font-weight:500}
    .b-nome.riscado{text-decoration:line-through;color:var(--text2)}
    .chip{font-size:9px;font-weight:500;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:2px}
    .chip-ok{background:var(--ok-l);color:#0F6E56}.chip-warn{background:var(--warn-l);color:#854F0B}.chip-err{background:var(--err-l);color:#A32D2D}
    .b-right{display:flex;align-items:center;gap:5px}
    .b-val{font-size:12px;font-weight:600}
    .edit-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:3px;border-radius:4px}
    .edit-btn:active{color:var(--fred)}

    /* MÉTRICAS */
    .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .metric{background:var(--bg);border-radius:var(--rs);padding:10px 12px}
    .metric-l{font-size:10px;color:var(--text2);margin-bottom:3px}
    .metric-v{font-size:15px;font-weight:600}
    .metric-v.ok{color:var(--ok)}.metric-v.warn{color:#BA7517}.metric-v.ov{color:var(--err)}

    /* ALERTA */
    .alerta{background:var(--warn-l);border:0.5px solid var(--warn);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
    .al-title{font-size:10px;font-weight:600;color:#854F0B;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
    .al-row{display:flex;justify-content:space-between;font-size:12px;color:#633806;padding:3px 0}
    .al-row:not(:last-child){border-bottom:0.5px solid rgba(239,159,39,.25)}

    /* LANÇAR */
    .lancar-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
    .sec-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
    .tipo-toggle{display:flex;gap:8px;margin-bottom:14px}
    .tipo-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;text-align:center}
    .tipo-btn.on.fred{border-color:var(--fred);background:var(--fred-l);color:var(--fred-d)}
    .tipo-btn.on.mya{border-color:var(--mya);background:var(--mya-l);color:var(--mya-d)}
    .parcelas-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .parcelas-label{font-size:13px;color:var(--text2);white-space:nowrap}
    .parc-opcoes{display:flex;gap:8px;margin-bottom:12px}
    .parc-opcao{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
    .parc-opcao.on.fred{border-color:var(--fred);background:var(--fred-l);color:var(--fred-d)}
    .parc-opcao.on.mya{border-color:var(--mya);background:var(--mya-l);color:var(--mya-d)}
    .parc-opcao.on{border-color:var(--fred);background:var(--fred-l);color:var(--fred-d)}
    .parc-ctrl{display:flex;align-items:center;gap:10px}
    .parc-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text)}
    .parc-num{font-size:18px;font-weight:600;min-width:22px;text-align:center}
    .parc-info{font-size:12px;color:var(--text2);margin-top:3px;margin-bottom:12px}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
    .cat-btn{border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rs);padding:9px 5px;cursor:pointer;text-align:center;transition:all .15s}
    .cat-btn:active{transform:scale(.97)}
    .cat-btn.on.fred{border-color:var(--fred);background:var(--fred-l)}
    .cat-btn.on.mya{border-color:var(--mya);background:var(--mya-l)}
    .cat-icon{font-size:20px;margin-bottom:2px}
    .cat-name{font-size:10px;font-weight:500;color:var(--text)}
    .cat-pct{font-size:9px;color:var(--text2);margin-top:1px}
    .alerta-cat{border-radius:var(--rs);padding:9px 12px;margin-bottom:12px;font-size:12px;font-weight:500}
    .alerta-ok{background:var(--ok-l);color:#0F6E56}.alerta-warn{background:var(--warn-l);color:#854F0B}.alerta-ov{background:var(--err-l);color:#A32D2D}
    .inp-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
    .valor-input{width:100%;font-size:30px;font-weight:700;border:none;border-bottom:2px solid var(--border);background:transparent;color:var(--text);padding:4px 0;outline:none;text-align:center;transition:border-color .2s;margin-bottom:14px}
    .valor-input.fred:focus{border-bottom-color:var(--fred)}
    .valor-input.mya:focus{border-bottom-color:var(--mya)}
    .obs-input{width:100%;font-size:13px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);padding:9px 12px;outline:none;margin-bottom:14px}
    .obs-input:focus{border-color:var(--fred)}
    .btn-main{width:100%;padding:14px;border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .btn-main:active{opacity:.85}
    .btn-fred{background:var(--fred)}.btn-mya{background:var(--mya)}.btn-off{background:var(--border)!important;color:var(--text2);cursor:not-allowed}

    /* HISTÓRICO */
    .filter-row{display:flex;gap:6px;margin-bottom:12px}
    .fchip{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:11px;font-weight:500;cursor:pointer;color:var(--text2)}
    .fchip.on{background:var(--bg);color:var(--text);border-color:var(--text2)}
    .lanc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border)}
    .lanc-row:last-child{border:none}
    .badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
    .badge-f{background:var(--fred-l);color:var(--fred-d)}.badge-m{background:var(--mya-l);color:var(--mya-d)}.badge-p{background:#F0ECF9;color:#5B3FA6}
    .del-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:4px;border-radius:4px}
    .del-btn:active{color:var(--err)}
    /* Toast offline */
    #offline-bar{position:fixed;top:0;left:0;right:0;background:#E24B4A;color:#fff;font-size:12px;font-weight:500;text-align:center;padding:6px;z-index:600;transform:translateY(-100%);transition:transform .3s}
    #offline-bar.show{transform:translateY(0)}
    /* Btn loading state */
    .btn-main.loading{opacity:.6;pointer-events:none}
    /* Edit gasto modal */
    .lanc-row:active{background:var(--bg)}
    /* Filtro categoria hist */
    .hist-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
    .hist-cats::-webkit-scrollbar{display:none}
    /* Pull to refresh */
    .ptr-indicator{text-align:center;font-size:12px;color:var(--text2);padding:10px;display:none}
    .ptr-indicator.show{display:block}
    /* Export btn */
    .export-btn{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:7px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;margin-bottom:12px;width:100%}
    .export-btn:active{background:var(--border)}
    /* Busca histórico */
    .hist-search{width:100%;font-size:14px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);padding:9px 12px 9px 36px;outline:none;margin-bottom:10px}
    .hist-search:focus{border-color:var(--fred)}
    .hist-search-wrap{position:relative;margin-bottom:2px}
    .hist-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none}
    /* Comparativo */
    .comp-up{color:#1D9E75;font-size:10px;font-weight:500}
    .comp-down{color:#E24B4A;font-size:10px;font-weight:500}
    .comp-eq{color:var(--text2);font-size:10px}
    /* Modo config boletos */
    .config-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--fred-l);border-radius:var(--r);margin-bottom:10px;border:0.5px solid var(--fred)}
    .config-bar-txt{font-size:13px;font-weight:600;color:var(--fred-d)}
    .config-bar-btn{font-size:12px;font-weight:600;color:var(--fred-d);background:none;border:1px solid var(--fred);border-radius:6px;padding:4px 10px;cursor:pointer}
    .b-del{background:none;border:none;cursor:pointer;color:var(--err);font-size:16px;padding:3px 5px;border-radius:4px;transition:opacity .15s}
    .b-del:active{opacity:.6}
    /* Modal novo boleto */
    .modal-select{width:100%;font-size:14px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);padding:9px 12px;outline:none;margin-bottom:0}
    .modal-select:focus{border-color:var(--fred)}
    .empty{text-align:center;color:var(--text2);font-size:13px;padding:2rem 0}

    /* MODAL */
    #modal-boleto{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
    #modal-boleto.hide{display:none}
    .modal-box{background:var(--surface);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:480px}
    .modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
    .modal-input{width:100%;font-size:24px;font-weight:700;border:none;border-bottom:2px solid var(--fred);background:transparent;color:var(--text);padding:4px 0;outline:none;text-align:center;margin-bottom:16px}
    .modal-field{margin-bottom:16px}
    .modal-field-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
    .modal-venc-ctrl{display:flex;align-items:center;justify-content:center;gap:16px}
    .modal-venc-num{font-size:28px;font-weight:700;min-width:40px;text-align:center;color:var(--text)}
    .modal-btns{display:flex;gap:8px}
    .modal-btn{flex:1;padding:12px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer}
    .modal-btn.cancel{background:var(--bg);color:var(--text2)}.modal-btn.confirm{background:var(--fred);color:#fff}
    .eye-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:4px 6px;border-radius:6px;line-height:1;transition:color .15s}
    .eye-btn:active{color:var(--fred)}
    .eye-btn.oculto{color:var(--fred)}
    .valor-oculto{filter:blur(6px);user-select:none;transition:filter .2s}

    /* LOADING */

function calcMes(off=0){
  const d=new Date(), dia=d.getDate()
  const base=dia<10?new Date(d.getFullYear(),d.getMonth()-1,1):new Date(d.getFullYear(),d.getMonth(),1)
  const ref=new Date(base.getFullYear(),base.getMonth()+off,1)
  return `${ref.getFullYear()}-${String(ref.getMonth()+1).padStart(2,'0')}`
}

  return n.charAt(0).toUpperCase()+n.slice(1,3)+' '+a
}

async function carregarGastosAnterior(){
  if(!sb) return
  const [ano,mes]=calcMes(mesOffset-1).split('-').map(Number)
  const mesAnt=calcMes(mesOffset-1)
  try{
    const{data}=await sb.from('gastos').select('cat,valor,pessoa').eq('mes',mesAnt)
    gastosAnterior=data||[]
  }catch{
    gastosAnterior=JSON.parse(store.get('gastos_v3')||'[]').filter(g=>g.mes===mesAnt)
  }
}

async function carregarGastos(){
  if(!sb){return}
  try{
    const{data,error}=await sb.from('gastos').select('*').eq('mes',mesAtual()).order('created_at',{ascending:true})
    if(error)throw error
    gastos=data||[]
  }catch{
    gastos=JSON.parse(store.get('gastos_v3')||'[]').filter(g=>g.mes===mesAtual())
  }
}
async function resetBoletosPagosSeNovoMes(){
  // Se o mês financeiro mudou desde o último acesso, limpa pagos locais
  const ultimoMes=store.get('gastei_ultimo_mes')
  const atual=mesAtual()
  if(ultimoMes && ultimoMes!==atual){
    // novo mês — boletos_pagos do mês atual virão vazios do Supabase mesmo
    // só limpamos o cache local do mês anterior
    store.del('boletosPagos_v3')
  }
  store.set('gastei_ultimo_mes',atual)
}

async function carregarBoletos(){
  if(!sb){return}
  try{
    const{data,error}=await sb.from('boletos_pagos').select('boleto_id').eq('mes',mesAtual())
    if(error)throw error
    boletosPagos=(data||[]).map(r=>r.boleto_id)
  }catch{boletosPagos=JSON.parse(store.get('boletosPagos_v3')||'[]')}
}

async function carregarBoletoConfig(){
  if(!sb){return}
  try{
    const{data,error}=await sb.from('boleto_config').select('*')
    if(error)throw error
    boletoValores={};boletoVencimentos={};boletoNomes={}
    ;(data||[]).forEach(r=>{
      if(r.valor!=null)  boletoValores[r.id]=r.valor
      if(r.venc!=null)   boletoVencimentos[r.id]=r.venc
      if(r.nome!=null)   boletoNomes[r.id]=r.nome
    })
    // cache local para offline
    store.set('boletoValores',JSON.stringify(boletoValores))
    store.set('boletoVencimentos',JSON.stringify(boletoVencimentos))
    store.set('boletoNomes',JSON.stringify(boletoNomes))
  }catch{
    boletoValores=JSON.parse(store.get('boletoValores')||'{}')
    boletoVencimentos=JSON.parse(store.get('boletoVencimentos')||'{}')
    boletoNomes=JSON.parse(store.get('boletoNomes')||'{}')
  }
}

async function carregarBoletosExtras(){

window.fecharModal=function(){document.getElementById('modal-boleto').classList.add('hide');editBoletoId=null}
window.salvarModal=async function(){
  const n=document.getElementById('modal-inp-nome').value.trim()
  const v=parseFloat(document.getElementById('modal-inp-valor').value)
  const d=parseInt(document.getElementById('modal-venc-num').value)
  if(!editBoletoId){fecharModal();return}
  if(n) boletoNomes[editBoletoId]=n
  if(!isNaN(v)&&v>0) boletoValores[editBoletoId]=v
  if(!isNaN(d)&&d>=1&&d<=31) boletoVencimentos[editBoletoId]=d
  // persiste cache local
  store.set('boletoValores',JSON.stringify(boletoValores))
  store.set('boletoVencimentos',JSON.stringify(boletoVencimentos))
  store.set('boletoNomes',JSON.stringify(boletoNomes))
  // sincroniza com Supabase (upsert)
  const row={id:editBoletoId,updated_at:new Date().toISOString()}
  if(n) row.nome=n
  if(!isNaN(v)&&v>0) row.valor=v
  if(!isNaN(d)&&d>=1&&d<=31) row.venc=d
  try{await sb.from('boleto_config').upsert([row],{onConflict:'id'})}catch(e){console.warn('offline',e)}
  fecharModal();renderAll();toast('✅ Boleto atualizado!')
}

// ── NAVEGAÇÃO ──────────────────────────────────────
window.goPage=function(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'))
  document.querySelectorAll('.tnb').forEach(e=>e.classList.remove('on'))
  document.getElementById('page-'+p).classList.add('on')
  const idx=['controle','dash','fixos','historico'].indexOf(p)
  if(idx>=0)document.querySelectorAll('.tnb')[idx].classList.add('on')
  if(p==='dash')renderHome()
  if(p==='controle')renderControle()
  if(p==='fixos')renderFixos()
  if(p==='historico')renderHist()
}

// ── LANÇAR ─────────────────────────────────────────
window.selCat=function(id){catSel=catSel===id?null:id;renderCatGrid();showAlerta();atualizarBotao()}
window.selTipo=function(t){
  tipoLanc=t
  document.getElementById('parcelas-area').style.display=t==='cartao'?'block':'none'
  document.getElementById('valor-label').textContent=t==='cartao'?'Valor total da compra (R$)':'Valor (R$)'
  const p=usuario||'fred'
  document.getElementById('tipo-normal').className='tipo-btn'+(t==='normal'?' on '+p:'')
  document.getElementById('tipo-cartao').className='tipo-btn'+(t==='cartao'?' on '+p:'')
  if(t==='cartao') selParc(1)  // default: 1x ao abrir
  atualizaParcelaInfo()
}
window.selParc=function(modo){
  // modo 1 = à vista no cartão (1x), modo 0 = parcelado
  const ctrl=document.getElementById('parc-ctrl-area')
  const btn1x=document.getElementById('parc-1x')
  const btnNx=document.getElementById('parc-nx')
  const p=usuario||'fred'
  if(modo===1){
    numParcelas=1
    ctrl.style.display='none'
    btn1x.className='parc-opcao on '+p
    btnNx.className='parc-opcao'
  } else {
    numParcelas=numParcelas<2?2:numParcelas
    document.getElementById('parc-num').textContent=numParcelas
    ctrl.style.display='block'
    btn1x.className='parc-opcao'
    btnNx.className='parc-opcao on '+p
  }
  atualizaParcelaInfo()
}
window.mudaParcelas=function(d){
  numParcelas=Math.max(2,Math.min(24,numParcelas+d))
  document.getElementById('parc-num').textContent=numParcelas
  atualizaParcelaInfo()
}
window.atualizaParcelaInfo=function(){
  if(tipoLanc!=='cartao')return
  const v=parseFloat(document.getElementById('inp-valor').value)||0
  const info=document.getElementById('parc-info');if(!info)return
  if(numParcelas===1) info.textContent=v>0?`Debitado no cartão: ${fmt(v)}`:''
  else info.textContent=v>0?`${numParcelas}x de ${fmt(v/numParcelas)}`:''
}
function atualizarBotao(){
  const btn=document.getElementById('btn-lancar');if(!btn)return
  const ok=usuario&&catSel
  btn.className='btn-main '+(ok?(usuario==='fred'?'btn-fred':'btn-mya'):'btn-off')
}
function renderLancar(){renderHome();return
  // legacy below
  
  const inp=document.getElementById('inp-valor')
  if(inp)inp.className='valor-input'+(usuario?' '+usuario:'')
  selTipo(tipoLanc);renderCatGrid();showAlerta();atualizarBotao()
}
function renderCatGrid(){
  const g=document.getElementById('cat-grid');if(!g)return
  g.innerHTML=''
  CATS.forEach(c=>{
    const gt=gastos.filter(x=>x.cat===c.id).reduce((a,b)=>a+b.valor,0)
    const pct=Math.min(100,Math.round(gt/c.limite*100))
    const sel=catSel===c.id
    const div=document.createElement('div')
    div.className='cat-btn'+(sel?' on '+(usuario||'fred'):'')
    div.innerHTML=`<div class="cat-icon"><i class="${c.icon}" style="font-size:20px;color:${c.color}" aria-hidden="true"></i></div>
      <div class="cat-name">${c.label}</div>`
    div.onclick=()=>selCat(c.id)
    g.appendChild(div)
  })
}
function showAlerta(){
  const box=document.getElementById('alerta-cat');if(!box)return
  box.style.display='none'
}
window.lancar=async function(){
  const vTotal=parseFloat(document.getElementById('inp-valor').value)
  const obs=document.getElementById('inp-obs').value.trim()
  if(!usuario||!catSel||!vTotal||vTotal<=0)return
  const btnL=document.getElementById('btn-lancar')
  if(btnL){btnL.classList.add('loading');btnL.textContent='Salvando…'}
  const hoje=new Date().toLocaleDateString('pt-BR')
  const novos=[]
  if(tipoLanc==='cartao'){
    const[ano,mes]=mesAtual().split('-').map(Number)
    const valorParc=numParcelas>1?parseFloat((vTotal/numParcelas).toFixed(2)):vTotal
    const totalParc=numParcelas>1?numParcelas:1

    // 1. Lançamento imediato no mês atual — representa o impacto real do gasto hoje
    const idGrupo=crypto.randomUUID().slice(0,8)  // id de grupo para ligar as parcelas
    novos.push({
      id:crypto.randomUUID(),
      pessoa:usuario,cat:catSel,
      valor:vTotal,
      obs:(obs?obs+' — ':'')+(numParcelas>1?`Cartão ${numParcelas}x (débito futuro)`:'Cartão 1x (débito futuro)'),
      mes:mesAtual(),
      data:hoje,
      tipo:'cartao_registro',   // aparece no mês atual como gasto real
      grupo_cartao:idGrupo,
      created_at:new Date().toISOString()
    })

    // 2. Parcelas nos meses futuros (a partir do próximo mês)
    for(let i=0;i<totalParc;i++){
      const ref=new Date(ano,mes+i,1)  // começa no MÊS SEGUINTE (mes+i, não mes-1+i)
      const mesParc=`${ref.getFullYear()}-${String(ref.getMonth()+1).padStart(2,'0')}`
      novos.push({
        id:crypto.randomUUID(),
        pessoa:usuario,cat:catSel,
        valor:valorParc,
        obs:(obs?obs+' — ':'')+(numParcelas>1?`Fatura ${i+1}/${totalParc}`:'Fatura cartão'),
        mes:mesParc,
        data:hoje,
        tipo:'cartao_fatura',   // aparece nos meses futuros como fatura
        grupo_cartao:idGrupo,
        created_at:new Date().toISOString()
      })
    }
  }else{
    novos.push({id:crypto.randomUUID(),pessoa:usuario,cat:catSel,valor:vTotal,obs,mes:mesAtual(),data:hoje,tipo:'normal',created_at:new Date().toISOString()})
  }
  document.getElementById('inp-valor').value=''
  document.getElementById('inp-obs').value=''
  catSel=null
  // adiciona ao estado em memória só os do mês atual visível
  novos.forEach(n=>{if(n.mes===mesAtual())gastos.push(n)})
  // persiste TODOS os novos (incluindo parcelas futuras) no localStorage
  const todosLocal=JSON.parse(store.get('gastos_v3')||'[]').filter(g=>!novos.find(n=>n.id===g.id))
  store.set('gastos_v3',JSON.stringify([...todosLocal,...novos]))
  renderAll()
  try{
    const{error}=await sb.from('gastos').insert(novos);if(error)throw error
    toast(tipoLanc==='cartao'?(numParcelas>1?`✅ ${numParcelas}x de ${fmt(vTotal/numParcelas)} — fatura a partir do próximo mês`:'✅ Cartão 1x — fatura no próximo mês'):'✅ Gasto registrado!')
  }catch{toast('⚠️ Salvo localmente')}
  goPage('dash')
}

      </div>

// ── CONTROLE (antigo PAINEL) ────────────────────────
function renderControle(){
  const el=document.getElementById('page-controle');if(!el)return
  const tb=todosBoletos()
  const totalGasto=gastos.reduce((a,b)=>a+b.valor,0)
  const totalFixo=tb.reduce((a,b)=>a+b.valor,0)
  const totalPago=tb.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
  const livre=RENDA-totalFixo
  const gastoPct=Math.min(100,Math.round(totalGasto/Math.max(livre,1)*100))
  const gFred=gastos.filter(x=>x.pessoa==='fred').reduce((a,b)=>a+b.valor,0)
  const gMya=gastos.filter(x=>x.pessoa==='mya').reduce((a,b)=>a+b.valor,0)
  const fredPct=totalGasto>0?Math.round(gFred/totalGasto*100):50
  const hoje=new Date().getDate()
  const pendentes=tb.filter(b=>!boletosPagos.includes(b.id)&&b.venc-hoje>=0&&b.venc-hoje<=5)

  let html=''

  // 1. HERO
  html+=`<div class="hero">
    <div class="hero-saudacao">${getSaudacao()}, ${usuario==='fred'?'Fred':'Mya'}! 👋</div>
    <div class="hero-label">Orçamento disponível</div>
    <div class="hero-val">${fmtV(livre)}</div>
    <div class="hero-pills">
      <div class="hp"><div class="hp-l">Renda</div><div class="hp-v">${fmtV(RENDA)}</div></div>
      <div class="hp"><div class="hp-l">Boletos pagos</div><div class="hp-v">${fmtV(totalPago)}</div></div>
      <div class="hp"><div class="hp-l">Gasto variável</div><div class="hp-v">${fmtV(totalGasto)}</div></div>
    </div>
  </div>`

  // 2. Fred vs Mya
  html+=`<div class="card">
    <div class="card-hdr"><span class="card-title">Gastos por pessoa</span></div>
    <div class="pessoa-row">
      <span class="p-name"><span class="dot dot-f"></span>Fred — ${fmtV(gFred)}</span>
      <span class="p-name">Mya — ${fmtV(gMya)}<span class="dot dot-m"></span></span>
    </div>
    <div class="stacked"><div class="sf" style="width:${fredPct}%"></div><div class="sm" style="width:${100-fredPct}%"></div></div>
  </div>`

  // 3. Categorias — barra baseada na margem real (RENDA - boletos)
  // margem distribuída: cada categoria pode consumir até 100% da margem
  // verde < 25%, amarelo 25–50%, vermelho > 50%
  const margemReal = Math.max(livre, 1)  // evita divisão por zero
  html+=`<div class="card"><div class="card-hdr"><span class="card-title">Categorias variáveis</span><span style="font-size:10px;color:var(--text2)">orçamento: ${fmtV(livre)}</span></div>`
  CATS.forEach(c=>{
    const gt=gastos.filter(x=>x.cat===c.id).reduce((a,b)=>a+b.valor,0)
    if(gt===0)return  // esconde categorias sem gasto
    const gF=gastos.filter(x=>x.cat===c.id&&x.pessoa==='fred').reduce((a,b)=>a+b.valor,0)
    const gM=gastos.filter(x=>x.cat===c.id&&x.pessoa==='mya').reduce((a,b)=>a+b.valor,0)
    const pct=Math.min(100,Math.round(gt/margemReal*100))
    const bCls=pct>50?'bf-ov':pct>25?'bf-warn':'bf-ok'
    const tCls=pct>50?'tag-ov':pct>25?'tag-warn':'tag-ok'
    const tTxt=pct>50?'Estourou':pct>25?'Atenção':'Ok'
    const sub=(gF>0||gM>0)?`<span style="font-size:10px;color:var(--text2)">${gF>0?'F:'+fmtV(gF):''}${gF>0&&gM>0?' · ':''}${gM>0?'M:'+fmtV(gM):''}</span>`:''
    const gtAnt=gastosAnterior.filter(x=>x.cat===c.id).reduce((a,b)=>a+b.valor,0)
    let compHtml=''
    if(gtAnt>0&&gt>0){const diff=gt-gtAnt;const pd=Math.round(Math.abs(diff)/gtAnt*100);compHtml=diff>0?'<span class="comp-down">▲'+pd+'%</span>':diff<0?'<span class="comp-up">▼'+pd+'%</span>':''}
    html+=`<div class="prog">
      <div class="prog-top">
        <span class="prog-name"><i class="${c.icon}" style="font-size:13px;color:${c.color}" aria-hidden="true"></i>${c.label} ${sub}</span>
        <span class="prog-right" style="display:flex;align-items:center;gap:5px">${compHtml}<span class="prog-vals">${fmtV(gt)} (${pct}%)</span><span class="tag ${tCls}">${tTxt}</span></span>
      </div>
      <div class="bar"><div class="bf ${bCls}" style="width:${pct}%"></div></div>
    </div>`
  })
  html+=`</div>`

  // 4. Boletos por grupo
  html+=`<div class="card" onclick="goPage('fixos')" style="cursor:pointer">
    <div class="card-hdr"><span class="card-title">Boletos por grupo</span><span class="card-link">Ver todos <i class="ti ti-chevron-right" aria-hidden="true"></i></span></div>`
  grupos().forEach(gr=>{
    const pagos=gr.boletos.filter(b=>boletosPagos.includes(b.id)).length
    const pago$=gr.boletos.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
    const pct=Math.round(pagos/gr.boletos.length*100)
    html+=`<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
        <span style="font-weight:500;display:flex;align-items:center;gap:5px"><i class="${gr.icon}" style="font-size:13px;color:${gr.color}" aria-hidden="true"></i>${gr.titulo}</span>
        <span style="color:var(--text2)">${pagos}/${gr.boletos.length} · ${fmtV(pago$)}</span>
      </div>
      <div class="bar"><div class="bf bf-ok" style="width:${pct}%"></div></div>
    </div>`
  })
  html+=`</div>`

  // 5. Métricas resumo (penúltimo)
  html+=`<div class="metric-grid">
    <div class="metric"><div class="metric-l">Renda</div><div class="metric-v">${fmtV(RENDA)}</div></div>
    <div class="metric"><div class="metric-l">Boletos pagos</div><div class="metric-v${totalPago===totalFixo?' ok':''}">${fmtV(totalPago)}</div></div>
    <div class="metric"><div class="metric-l">Gasto variável</div><div class="metric-v">${fmtV(totalGasto)}</div></div>
    <div class="metric"><div class="metric-l">Orçamento disponível</div><div class="metric-v ok">${fmtV(livre)}</div></div>
  </div>`

  // 6. Vencendo em breve (último)
  if(pendentes.length){
    html+=`<div class="alerta">
      <div class="al-title"><i class="ti ti-bell" aria-hidden="true"></i> Vencendo em breve</div>`
    pendentes.forEach(b=>{
      const d=b.venc-hoje
      html+=`<div class="al-row"><span>${b.nome}</span><span>${d===0?'Vence hoje!':'Em '+d+'d'} · ${fmtV(b.valor)}</span></div>`
    })
    html+=`</div>`
  }

  el.innerHTML=html
}

    const collapsed=gruposCollapsed[gr.id]
    const pagos=gr.boletos.filter(b=>boletosPagos.includes(b.id)).length
    const pago$=gr.boletos.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
    html+=`<div class="grupo-card">
      <div class="grupo-hdr" onclick="toggleGrupo('${gr.id}')">
        <span class="grupo-titulo"><i class="${gr.icon}" style="font-size:15px;color:${gr.color}" aria-hidden="true"></i>${gr.titulo}</span>
        <span style="display:flex;align-items:center;gap:7px">
          <span class="grupo-resumo">${pagos}/${gr.boletos.length} · ${fmtV(pago$)}</span>
          <i class="ti ${collapsed?'ti-chevron-down':'ti-chevron-up'}" style="font-size:13px;color:var(--text2)" aria-hidden="true"></i>
        </span>
      </div>`
    if(!collapsed){
      gr.boletos.forEach(b=>{
        const pago=boletosPagos.includes(b.id)
        const h=new Date().getDate(),diff=b.venc-h
        let cc,ct
        if(pago)           { cc='chip-ok';  ct='Pago ✓' }
        else if(diff<0)    { cc='chip-warn'; ct='Dia '+b.venc }
        else if(diff===0)  { cc='chip-err';  ct='Vence hoje!' }
        else if(diff<=5)   { cc='chip-warn'; ct='Em '+diff+'d' }
        else               { cc='chip-ok';   ct='Dia '+b.venc }
        const chkCls  = 'chk'+(pago?' on':'')
        const chkClr  = pago?'#fff':'transparent'
        const nomeCls = 'b-nome'+(pago?' riscado':'')
        const delBtn  = (modoConfigBoletos&&b._extra)
          ? '<button class="b-del" onclick="excluirBoletoExtra(this.dataset.id)" data-id="'+b.id+'"><i class="ti ti-trash"></i></button>'
          : ''
        const editBtn = '<button class="edit-btn" onclick="abrirModal(this.dataset.id,this.dataset.nome,this.dataset.valor,this.dataset.venc)" data-id="'+b.id+'" data-nome="'+b.nome.replace(/"/g,'&quot;')+'" data-valor="'+b.valor+'" data-venc="'+b.venc+'" aria-label="Editar"><i class="ti ti-pencil" aria-hidden="true"></i></button>'
        html += '<div class="boleto-row">'
        html += '<div class="b-check" onclick="toggleBoleto(this.dataset.id)" data-id="'+b.id+'">'
        html += '<div class="'+chkCls+'"><i class="ti ti-check" style="font-size:11px;color:'+chkClr+'" aria-hidden="true"></i></div>'
        html += '<div class="b-info">'
        html += '<div class="'+nomeCls+'">'+b.nome+'</div>'
        html += '<span class="chip '+cc+'">'+ct+'</span>'
        html += '</div></div>'
        html += '<div class="b-right">'
        html += '<div class="b-val">'+fmtV(b.valor)+'</div>'
        html += delBtn + editBtn
        html += '</div></div>'
      })
    }
    html+=`</div>`
  })
  el.innerHTML=html
}

// ── HISTÓRICO ──────────────────────────────────────
function renderHist(){
  const el=document.getElementById('page-historico');if(!el)return
  let filtrados=histFiltro==='todos'?gastos:gastos.filter(x=>x.pessoa===histFiltro)
  if(histCatFiltro!=='todas') filtrados=filtrados.filter(x=>x.cat===histCatFiltro)
  if(histBusca){
    const q=histBusca.toLowerCase()
    filtrados=filtrados.filter(x=>{
      const c=CATS.find(c=>c.id===x.cat)
      return (c&&c.label.toLowerCase().includes(q))
        ||(x.obs&&x.obs.toLowerCase().includes(q))
        ||String(x.valor).includes(q)
    })
  }
  const sorted=[...filtrados].reverse()
  let html='<button class="export-btn" onclick="exportarResumo()">'
  html+='<i class="ti ti-download" aria-hidden="true"></i> Exportar resumo do mês</button>'
  html+='<div class="hist-search-wrap">'
  html+='<i class="ti ti-search hist-search-icon" aria-hidden="true"></i>'
  html+='<input class="hist-search" type="text" placeholder="Buscar categoria, valor ou observação…" '
  html+='value="'+histBusca.replace(/"/g,'&quot;')+'" oninput="histBusca=this.value;renderHist()" /></div>'
  html+='<div class="filter-row">'
  html+='<button class="fchip '+(histFiltro==='todos'?'on':'')+'" data-id="todos" onclick="setFiltro(this.dataset.id)">Todos</button>'
  html+='<button class="fchip '+(histFiltro==='fred'?'on':'')+'" data-id="fred" onclick="setFiltro(this.dataset.id)">Fred</button>'
  html+='<button class="fchip '+(histFiltro==='mya'?'on':'')+'" data-id="mya" onclick="setFiltro(this.dataset.id)">Mya</button>'
  html+='</div>'
  let catChips='<div class="hist-cats">'
  catChips+='<button class="fchip '+(histCatFiltro==='todas'?'on':'')+'" onclick="setCatFiltro(this.dataset.id)" data-id="todas">Todas</button>'
  CATS.forEach(c=>{
    catChips+='<button class="fchip '+(histCatFiltro===c.id?'on':'')+'" onclick="setCatFiltro(this.dataset.id)" data-id="'+c.id+'" style="white-space:nowrap">'
    catChips+='<i class="'+c.icon+'" style="font-size:11px;color:'+c.color+'"></i> '+c.label+'</button>'
  })
  catChips+='</div>'
  html+=catChips
  if(!sorted.length){
    html+='<div class="card"><p class="empty"><i class="ti ti-receipt-off" style="font-size:26px;display:block;margin-bottom:8px"></i>'
    html+=(histBusca?'Nenhum resultado para "'+histBusca+'"':'Nenhum lançamento ainda')+'</p></div>'
    el.innerHTML=html;return
  }
  const totalF=filtrados.reduce((a,b)=>a+b.valor,0)
  html+='<div class="metric-grid">'
  html+='<div class="metric"><div class="metric-l">'+sorted.length+' lançamento'+(sorted.length!==1?'s':'')+'</div><div class="metric-v">'+fmtV(totalF)+'</div></div>'
  html+='<div class="metric"><div class="metric-l">Média por gasto</div><div class="metric-v">'+fmtV(sorted.length?totalF/sorted.length:0)+'</div></div>'
  html+='</div><div class="card">'
  sorted.forEach(g=>{
    const c=CATS.find(x=>x.id===g.cat)||{icon:'ti ti-dots',label:'Outros',color:'#888'}
    const isFred=g.pessoa==='fred'
    const isRegistro=g.tipo==='cartao_registro'
    const isFatura=g.tipo==='cartao_fatura'
    const isEditing=editGastoInline===g.id
    const gid=g.id
    const editColor=isEditing?'var(--fred)':'var(--text2)'
    const badgeCartao=isRegistro?'<span class="badge badge-p"><i class="ti ti-credit-card" style="font-size:9px"></i> Cartão</span>':''
    const badgeFatura=isFatura?'<span class="badge" style="background:#F0ECF9;color:#5B3FA6"><i class="ti ti-receipt" style="font-size:9px"></i> Fatura</span>':''
    const obsText=g.obs?' · '+g.obs:''
    let row='<div class="lanc-row" style="'+(isEditing?'flex-direction:column;align-items:stretch;gap:8px;':'')+'">'
    row+='<div style="display:flex;justify-content:space-between;align-items:center">'
    row+='<div style="display:flex;align-items:center;gap:8px">'
    row+='<i class="'+c.icon+'" style="font-size:15px;color:'+c.color+'"></i><div>'
    row+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;flex-wrap:wrap">'
    row+='<span style="font-size:12px;font-weight:500">'+c.label+'</span>'
    row+='<span class="badge '+(isFred?'badge-f':'badge-m')+'">'+(isFred?'Fred':'Mya')+'</span>'
    row+=badgeCartao+badgeFatura
    row+='</div><div style="font-size:10px;color:var(--text2)">'+g.data+obsText+'</div></div></div>'
    row+='<div style="display:flex;align-items:center;gap:6px">'
    row+='<span style="font-size:13px;font-weight:600;color:var(--err)">- '+fmtV(g.valor)+'</span>'
    row+='<button class="del-btn" onclick="abrirEditarGasto(this.dataset.id)" data-id="'+gid+'" style="color:'+editColor+'"><i class="ti ti-pencil"></i></button>'
    row+='<button class="del-btn" onclick="deletarGasto(this.dataset.id)" data-id="'+gid+'"><i class="ti ti-trash"></i></button>'
    row+='</div></div>'
    if(isEditing){
      const obsAtual=(g.obs||'').replace(/"/g,'&quot;')
      row+='<div style="display:flex;flex-direction:column;gap:8px;padding:10px 0 4px;border-top:0.5px solid var(--border)">'
      row+='<div style="display:flex;gap:8px">'
      row+='<div style="flex:1"><div class="modal-field-label" style="margin-bottom:4px">Valor (R$)</div>'
      row+='<input class="obs-input" type="number" id="eg-valor-'+gid+'" value="'+g.valor+'" inputmode="decimal" step="0.01" style="width:100%"/></div>'
      row+='<div style="flex:2"><div class="modal-field-label" style="margin-bottom:4px">Observação</div>'
      row+='<input class="obs-input" type="text" id="eg-obs-'+gid+'" value="'+obsAtual+'" placeholder="opcional" style="width:100%"/></div></div>'
      row+='<div style="display:flex;gap:8px">'
      row+='<button class="modal-btn cancel" style="flex:1;padding:9px" onclick="fecharEditarGasto()">Cancelar</button>'
      row+='<button class="modal-btn confirm" style="flex:2;padding:9px" onclick="salvarEdicaoGasto(this.dataset.id)" data-id="'+gid+'">Salvar</button>'
      row+='</div></div>'
    }
    row+='</div>'
    html+=row
  })
  html+='</div>'
  el.innerHTML=html
}
window.setFiltro=function(f){histFiltro=f;renderHist()}
window.setCatFiltro=function(id){histCatFiltro=id;renderHist()}

window.exportarResumo=function(){
  const tb=todosBoletos()
  const totalFixo=tb.reduce((a,b)=>a+b.valor,0)
  const totalPago=tb.filter(b=>boletosPagos.includes(b.id)).reduce((a,b)=>a+b.valor,0)
  const totalGasto=gastos.reduce((a,b)=>a+b.valor,0)
  const livre=RENDA-totalFixo
  const gFred=gastos.filter(x=>x.pessoa==='fred').reduce((a,b)=>a+b.valor,0)
  const gMya=gastos.filter(x=>x.pessoa==='mya').reduce((a,b)=>a+b.valor,0)
  const sep='─'.repeat(32)
  let txt='💸 GASTEI! — Resumo '+mesLabel()+'\n'
  txt+=sep+'\n'
  txt+='Renda:                  '+fmt(RENDA)+'\n'
  txt+='Boletos (total):        '+fmt(totalFixo)+'\n'
  txt+='Boletos pagos:          '+fmt(totalPago)+'\n'
  txt+='Gasto variável:         '+fmt(totalGasto)+'\n'
  txt+='Orçamento disponível:   '+fmt(livre)+'\n'
  txt+=sep+'\n'
  txt+='Fred gastou:  '+fmt(gFred)+'\n'
  txt+='Mya gastou:   '+fmt(gMya)+'\n'
  txt+=sep+'\n'
  txt+='Por categoria:\n'
  CATS.forEach(c=>{
    const g=gastos.filter(x=>x.cat===c.id).reduce((a,b)=>a+b.valor,0)
    if(g>0) txt+='  '+c.label.padEnd(18)+' '+fmt(g)+'\n'
  })
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>toast('📋 Resumo copiado!'))
  } else {
    const el=document.createElement('textarea')
    el.value=txt;document.body.appendChild(el);el.select()
    document.execCommand('copy');document.body.removeChild(el)
    toast('📋 Resumo copiado!')
  }
}

// ── RENDER GERAL ───────────────────────────────────
function renderAll(){renderHome();renderControle();renderFixos();renderHist()}
async function recarregarDados(){
  await Promise.all([carregarGastos(),carregarGastosAnterior(),carregarBoletos(),carregarBoletoConfig(),carregarBoletosExtras()])
  atualizarTotaisLogin()
  renderAll()
}

function iniciarRealtime(){
  if(!sb)return
  sb.channel('gastei-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'gastos'},      async()=>{await carregarGastos();renderAll()})
    .on('postgres_changes',{event:'*',schema:'public',table:'boletos_pagos'},async()=>{await carregarBoletos();renderFixos();renderControle()})
    .on('postgres_changes',{event:'*',schema:'public',table:'boleto_config'},async()=>{await carregarBoletoConfig();renderAll()})
    .on('postgres_changes',{event:'*',schema:'public',table:'boletos_extras'},async()=>{await carregarBoletosExtras();renderAll()})
    .subscribe()
}

// ── INIT ───────────────────────────────────────────
async function init(){
  initSB()
  document.getElementById('mes-label').textContent=mesLabel()
  gruposCollapsed=JSON.parse(store.get('gruposCollapsed')||'{}')
  // boletoValores, boletoVencimentos, boletoNomes, boletosExtras
  // são carregados do Supabase em carregarBoletoConfig() / carregarBoletosExtras()
  ocultarValores=store.get('gastei_ocultar')==='1'
  const eyeBtn=document.getElementById('eye-btn')
  const eyeIco=document.getElementById('eye-icon')
  if(eyeBtn) eyeBtn.classList.toggle('oculto',ocultarValores)
  if(eyeIco) eyeIco.className=ocultarValores?'ti ti-eye-off':'ti ti-eye'
  await resetBoletosPagosSeNovoMes()
  try{
    await Promise.all([carregarGastos(),carregarGastosAnterior(),carregarBoletos(),carregarBoletoConfig(),carregarBoletosExtras()])
  }catch(e){console.warn('Erro no carregamento inicial:',e)}
  atualizarTotaisLogin()
  iniciarRealtime()
  const u=store.get('gastei_usuario')
  if(u){usuario=u;document.getElementById('tela-login').classList.add('hide');atualizarChip();renderAll()}
  hideLoading()
}
init()
</script>
