<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Gastei!</title>
  <meta name="description" content="Controle financeiro do casal" />
  <meta name="theme-color" content="#1B4F72" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />

  <style>
    :root {
      --color-bg: #f5f6fa;
      --color-surface: #ffffff;
      --color-border: #e2e5ec;
      --color-text: #1a1d23;
      --color-text-secondary: #6b7280;
      --color-fred: #378ADD;
      --color-fred-light: #E6F1FB;
      --color-fred-dark: #185FA5;
      --color-mya: #D4537E;
      --color-mya-light: #FBEAF0;
      --color-mya-dark: #993556;
      --color-success: #1D9E75;
      --color-success-light: #E1F5EE;
      --color-warn: #EF9F27;
      --color-warn-light: #FAEEDA;
      --color-danger: #E24B4A;
      --color-danger-light: #FCEBEB;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0f1117;
        --color-surface: #1c1f27;
        --color-border: #2a2f3d;
        --color-text: #f0f1f5;
        --color-text-secondary: #8b92a8;
        --color-fred-light: #1a2d45;
        --color-mya-light: #3a1c28;
        --color-success-light: #0d2e22;
        --color-warn-light: #2e2010;
        --color-danger-light: #2e1212;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* ── HEADER ── */
    .header {
      padding: 16px 20px 12px;
      background: var(--color-surface);
      border-bottom: 0.5px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .mes-badge {
      font-size: 12px; font-weight: 500; padding: 4px 10px;
      border-radius: 20px; background: var(--color-fred-light); color: var(--color-fred-dark);
    }

    /* ── SCROLL AREA ── */
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: flex; background: var(--color-surface);
      border-top: 0.5px solid var(--color-border);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 0; border: none; background: transparent; cursor: pointer;
      color: var(--color-text-secondary); font-size: 11px; font-weight: 500; transition: color .15s;
    }
    .nav-btn i { font-size: 22px; }
    .nav-btn.active { color: var(--color-fred); }

    /* ── CARDS ── */
    .card {
      background: var(--color-surface); border: 0.5px solid var(--color-border);
      border-radius: var(--radius); padding: 1rem 1.125rem;
      margin-bottom: 12px; box-shadow: var(--shadow);
    }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--color-text-secondary);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px;
    }

    /* ── METRIC GRID ── */
    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
    .metric { background: var(--color-bg); border-radius: var(--radius-sm); padding: .75rem; }
    .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
    .metric-value { font-size: 17px; font-weight: 600; color: var(--color-text); }
    .metric-value.success { color: var(--color-success); }
    .metric-value.danger { color: var(--color-danger); }
    .metric-value.warn { color: #BA7517; }

    /* ── PROGRESS ── */
    .bar-bg { height: 7px; background: var(--color-bg); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
    .bar-ok { background: var(--color-success); }
    .bar-warn { background: var(--color-warn); }
    .bar-over { background: var(--color-danger); }
    .stacked-bar { height: 9px; border-radius: 5px; overflow: hidden; display: flex; }
    .stacked-fred { background: var(--color-fred); }
    .stacked-mya { background: var(--color-mya); }

    /* ── TAGS ── */
    .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .tag-ok { background: var(--color-success-light); color: #0F6E56; }
    .tag-warn { background: var(--color-warn-light); color: #854F0B; }
    .tag-over { background: var(--color-danger-light); color: #A32D2D; }
    .tag-pago { background: var(--color-success-light); color: #0F6E56; }
    .chip { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; display: inline-block; }
    .chip-ok { background: var(--color-success-light); color: #0F6E56; }
    .chip-warn { background: var(--color-warn-light); color: #854F0B; }
    .chip-danger { background: var(--color-danger-light); color: #A32D2D; }

    /* ── ALERT ── */
    .alert { border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 10px; font-size: 13px; font-weight: 500; }
    .alert-ok { background: var(--color-success-light); color: #0F6E56; }
    .alert-warn { background: var(--color-warn-light); color: #854F0B; }
    .alert-over { background: var(--color-danger-light); color: #A32D2D; }

    /* ── PESSOA TOGGLE ── */
    .pessoa-toggle { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .pessoa-btn {
      flex: 1; padding: 12px; border: 1.5px solid var(--color-border);
      border-radius: var(--radius); background: var(--color-surface);
      cursor: pointer; text-align: center; transition: all .15s;
    }
    .pessoa-btn.fred.active { border-color: var(--color-fred); background: var(--color-fred-light); }
    .pessoa-btn.mya.active { border-color: var(--color-mya); background: var(--color-mya-light); }
    .pessoa-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600; margin: 0 auto 6px;
    }
    .av-fred { background: var(--color-fred-light); color: var(--color-fred-dark); }
    .av-mya { background: var(--color-mya-light); color: var(--color-mya-dark); }
    .pessoa-name { font-size: 14px; font-weight: 600; }
    .pessoa-total { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

    /* ── CATEGORIA GRID ── */
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .cat-btn {
      border: 1.5px solid var(--color-border); background: var(--color-surface);
      border-radius: var(--radius-sm); padding: 10px 6px; cursor: pointer; text-align: center;
      transition: all .15s;
    }
    .cat-btn:active { transform: scale(.97); }
    .cat-btn.sel-fred { border-color: var(--color-fred); background: var(--color-fred-light); }
    .cat-btn.sel-mya { border-color: var(--color-mya); background: var(--color-mya-light); }
    .cat-icon { font-size: 22px; margin-bottom: 3px; }
    .cat-name { font-size: 11px; font-weight: 500; color: var(--color-text); }
    .cat-pct { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }

    /* ── INPUTS ── */
    .input-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
    .valor-input {
      width: 100%; font-size: 32px; font-weight: 600; border: none;
      border-bottom: 2px solid var(--color-border); background: transparent;
      color: var(--color-text); padding: 4px 0; outline: none; text-align: center;
      transition: border-color .2s;
    }
    .valor-input.fred:focus { border-bottom-color: var(--color-fred); }
    .valor-input.mya:focus { border-bottom-color: var(--color-mya); }
    .obs-input {
      width: 100%; font-size: 14px; border: 1px solid var(--color-border);
      border-radius: var(--radius-sm); background: var(--color-bg);
      color: var(--color-text); padding: 10px 13px; outline: none;
    }
    .obs-input:focus { border-color: var(--color-fred); }

    /* ── BOTÃO PRINCIPAL ── */
    .btn-primary {
      width: 100%; padding: 15px; border: none; border-radius: var(--radius);
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .15s; margin-top: 6px;
    }
    .btn-primary:active { opacity: .85; }
    .btn-fred { background: var(--color-fred); }
    .btn-mya { background: var(--color-mya); }
    .btn-disabled { background: var(--color-border) !important; color: var(--color-text-secondary); cursor: not-allowed; }

    /* ── BOLETOS ── */
    .grupo-card { background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
    .grupo-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 16px; cursor: pointer; user-select: none;
    }
    .grupo-titulo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
    .grupo-resumo { font-size: 12px; color: var(--color-text-secondary); }
    .boleto-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px 11px 20px;
      border-top: 0.5px solid var(--color-border);
      cursor: pointer; transition: background .1s;
    }
    .boleto-row:active { background: var(--color-bg); }
    .check-box {
      width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--color-border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s;
    }
    .check-box.checked { background: var(--color-success); border-color: var(--color-success); }
    .boleto-info { flex: 1; }
    .boleto-nome { font-size: 13px; font-weight: 500; }
    .boleto-nome.riscado { text-decoration: line-through; color: var(--color-text-secondary); }
    .boleto-right { text-align: right; }
    .boleto-valor { font-size: 13px; font-weight: 600; }

    /* ── HISTÓRICO ── */
    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .filter-chip {
      padding: 6px 14px; border: 1px solid var(--color-border); border-radius: 20px;
      background: var(--color-surface); font-size: 12px; font-weight: 500;
      cursor: pointer; color: var(--color-text-secondary); transition: all .15s;
    }
    .filter-chip.active { background: var(--color-bg); color: var(--color-text); border-color: var(--color-text-secondary); }
    .lanc-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 0.5px solid var(--color-border); font-size: 13px;
    }
    .lanc-row:last-child { border: none; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .badge-fred { background: var(--color-fred-light); color: var(--color-fred-dark); }
    .badge-mya { background: var(--color-mya-light); color: var(--color-mya-dark); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; padding: 4px; border-radius: 4px; }
    .del-btn:active { color: var(--color-danger); }
    .empty { text-align: center; color: var(--color-text-secondary); font-size: 13px; padding: 2rem 0; }

    /* ── PROGRESS ROW ── */
    .prog-row { margin-bottom: 11px; }
    .prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .prog-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .prog-vals { font-size: 11px; color: var(--color-text-secondary); }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; background: var(--color-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      z-index: 999; transition: opacity .3s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--color-border); border-top-color: var(--color-fred); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--color-text-secondary); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a1d23; color: #fff; font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 20px; opacity: 0; transition: all .25s;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Carregando…</div>
</div>

<div id="toast"></div>

<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div>
      <div class="header-title">💸 Gastei!</div>
      <div class="header-sub" id="header-sub">Controle financeiro do casal</div>
    </div>
    <div class="mes-badge" id="mes-badge">—</div>
  </header>

  <!-- CONTEÚDO -->
  <main class="content">

    <!-- PAINEL -->
    <div id="page-dash" class="page active"></div>

    <!-- LANÇAR -->
    <div id="page-lancar" class="page">
      <div class="card">
        <p class="section-label">Quem está lançando?</p>
        <div class="pessoa-toggle">
          <div class="pessoa-btn fred" id="pbtn-fred" onclick="selPessoa('fred')">
            <div class="pessoa-avatar av-fred">F</div>
            <div class="pessoa-name">Fred</div>
            <div class="pessoa-total" id="pgasto-fred">R$ 0,00</div>
          </div>
          <div class="pessoa-btn mya" id="pbtn-mya" onclick="selPessoa('mya')">
            <div class="pessoa-avatar av-mya">M</div>
            <div class="pessoa-name">Mya</div>
            <div class="pessoa-total" id="pgasto-mya">R$ 0,00</div>
          </div>
        </div>
        <p class="section-label">Qual categoria?</p>
        <div class="cat-grid" id="cat-grid"></div>
        <div id="alerta-cat" style="display:none"></div>
        <div style="margin-bottom:14px">
          <label class="input-label">Valor (R$)</label>
          <input class="valor-input" type="number" id="inp-valor" placeholder="0,00" min="0" step="0.01" inputmode="decimal" />
        </div>
        <div style="margin-bottom:14px">
          <label class="input-label">O que foi? (opcional)</label>
          <input class="obs-input" type="text" id="inp-obs" placeholder="ex: posto Shell, mercado, farmácia…" />
        </div>
        <button class="btn-primary btn-disabled" id="btn-lancar" onclick="lancar()">Registrar gasto</button>
      </div>
    </div>

    <!-- BOLETOS -->
    <div id="page-fixos" class="page"></div>

    <!-- HISTÓRICO -->
    <div id="page-historico" class="page"></div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="goPage('dash')"><i class="ti ti-chart-bar"></i>Painel</button>
    <button class="nav-btn" onclick="goPage('lancar')"><i class="ti ti-plus-circle"></i>Lançar</button>
    <button class="nav-btn" onclick="goPage('fixos')"><i class="ti ti-receipt"></i>Boletos</button>
    <button class="nav-btn" onclick="goPage('historico')"><i class="ti ti-list"></i>Histórico</button>
  </nav>
</div>

<script src="app.js"></script>
</body>
</html>
